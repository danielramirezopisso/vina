<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VINA — Tu área personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#12291D; --verde-2:#0C1E15; --crema:#F4F0E6; --crema-2:#EAE4D4;
  --card:#FBF8F1; --tinto:#7A2231; --lima:#C7D8A7; --ink:#141613;
  --dorado:#C7A94B; --line:rgba(18,41,29,.15); --gris:#B9B4A6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Work Sans',sans-serif;font-weight:300;background:var(--crema);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.serif{font-family:'Fraunces',serif;font-weight:400}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
:focus-visible{outline:2px solid var(--tinto);outline-offset:2px}
.eyebrow{font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;color:var(--tinto);font-weight:600}
.btn{display:inline-block;border-radius:2px;padding:.75rem 1.6rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;text-decoration:none;border:1px solid transparent;transition:all .3s}
.btn-verde{background:var(--verde);color:var(--crema)}
.btn-verde:hover{background:var(--verde-2)}
.btn-tinto{background:var(--tinto);color:var(--crema)}
.btn-tinto:hover{background:#5E1A26}
.btn-outline{border-color:var(--verde);color:var(--verde);background:transparent}
.btn-outline:hover{background:var(--verde);color:var(--crema)}
.btn-sm{padding:.5rem 1rem;font-size:.62rem}

/* ---------- login ---------- */
#loginView{min-height:100svh;display:flex;align-items:center;justify-content:center;background:var(--verde);padding:1.5rem;position:relative;overflow:hidden}
.login-ring{position:absolute;width:76vmin;height:76vmin;border:1px solid rgba(199,216,167,.18);border-radius:50%}
.login-ring::after{content:"";position:absolute;inset:34px;border:1px solid rgba(199,216,167,.1);border-radius:50%}
.login-card{position:relative;background:var(--crema);padding:3rem 2.6rem;width:100%;max-width:390px;border-radius:2px}
.login-logo{font-family:'Fraunces',serif;font-size:1.6rem;letter-spacing:.34em;color:var(--verde);text-align:center;display:block}
.login-logo span{color:var(--tinto)}
.login-sub{text-align:center;font-size:.66rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gris);margin:.4rem 0 2rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tinto);margin-bottom:.35rem;font-weight:600}
.field input,.field select{width:100%;border:1px solid var(--line);background:var(--card);padding:.75rem .85rem;font-family:inherit;font-size:.93rem;border-radius:2px;color:var(--ink)}
.field input:focus,.field select:focus{outline:none;border-color:var(--verde)}
.login-hint{margin-top:1.4rem;text-align:center;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;opacity:.45}
.login-error{color:var(--tinto);font-size:.8rem;text-align:center;min-height:1.2em;margin-top:.7rem}

/* ---------- app shell ---------- */
#appView{display:none;min-height:100svh}
.topbar{background:var(--verde);color:var(--crema);padding:1rem 4vw;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:40}
.topbar .logo{font-family:'Fraunces',serif;font-size:1.25rem;letter-spacing:.3em;text-decoration:none}
.topbar .logo span{color:var(--lima)}
.realmap svg{width:100%;height:auto;display:block}
.realmap .es{fill:#1C3A2A !important;stroke:rgba(244,240,230,.15) !important}
.realmap .zone{fill:#2A4536 !important;stroke:rgba(244,240,230,.22) !important;stroke-width:.5 !important}
.realmap .zone:hover{filter:brightness(1.4)}
.realmap .zone.disc{fill:var(--lima) !important;stroke:rgba(255,255,255,.85) !important;stroke-width:.8 !important}
.realmap .frame{stroke:rgba(244,240,230,.3) !important}
.realmap .attr{fill:rgba(244,240,230,.4) !important}
.tabs{display:flex;gap:.2rem;flex-wrap:wrap}
.tabs button{background:none;border:none;color:var(--crema);opacity:.7;padding:.5rem .9rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;border-bottom:2px solid transparent;transition:opacity .25s,border-color .25s}
.tabs button:hover{opacity:1}
.tabs button.active{opacity:1;border-bottom-color:var(--lima)}
.hello{font-size:.75rem;opacity:.75}
.top-right{display:flex;align-items:center;gap:1rem}
.top-link{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;opacity:.7}
.top-link:hover{opacity:1}
.top-salir{
  background:none;border:1px solid rgba(244,240,230,.35);color:var(--crema);border-radius:2px;
  padding:.35rem .8rem;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  transition:background .25s,color .25s;
}
.top-salir:hover{background:var(--crema);color:var(--verde)}
main{max-width:1160px;margin:0 auto;padding:2.6rem 4vw 5rem}
.page-head{margin-bottom:2rem}
.page-head .eyebrow{display:block;margin-bottom:.4rem}
.page-head h2{font-size:clamp(1.8rem,3.6vw,2.6rem);color:var(--verde);line-height:1.12}
.page-head p{opacity:.7;max-width:64ch;margin-top:.5rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:1.8rem}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:2.4rem}
.stat{background:var(--card);padding:1.3rem 1.2rem}
.stat .v{font-family:'Fraunces',serif;font-size:2rem;color:var(--verde);line-height:1.1}
.stat .l{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gris);font-weight:600}
.pill{display:inline-block;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;padding:.16rem .55rem;border-radius:10px;font-weight:600}
.pill-lima{background:rgba(199,216,167,.4);color:var(--verde)}
.pill-gris{background:rgba(20,22,19,.07);color:var(--ink)}

/* ---------- viaje ---------- */
.viaje-wrap{display:grid;grid-template-columns:1fr 320px;gap:2.4rem;align-items:start}
.jpath{position:relative;padding-left:2.4rem}
.jpath::before{content:"";position:absolute;left:13px;top:20px;bottom:20px;width:1px;background:var(--line)}
.jstop{position:relative;padding:1.1rem 0 1.1rem .4rem}
.jstop::before{content:"";position:absolute;left:-2.4rem;top:1.55rem;width:27px;height:27px;border-radius:50%;background:var(--crema);border:1px solid var(--gris)}
.jstop.done::before{background:var(--verde);border-color:var(--verde)}
.jstop.current::before{background:var(--lima);border-color:var(--verde);box-shadow:0 0 0 5px rgba(199,216,167,.35)}
.jstop .tick{position:absolute;left:-2.05rem;top:1.72rem;color:var(--lima);font-size:.8rem;z-index:2}
.jstop.locked{opacity:.5}
.jstop .s-label{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--tinto);font-weight:600}
.jstop h3{font-size:1.5rem;color:var(--verde);line-height:1.2}
.jstop p{font-size:.86rem;opacity:.72;max-width:52ch}
.jstop .j-wines{font-size:.75rem;color:var(--tinto);margin-top:.2rem}
.next-box{position:sticky;top:90px}
.next-box .card h3{font-size:1.4rem;color:var(--verde);margin-bottom:.6rem}
.next-box .big-date{font-family:'Fraunces',serif;font-size:2.1rem;color:var(--tinto);line-height:1.1}
.next-box p{font-size:.84rem;opacity:.7;margin-top:.6rem}
.mono-note{background:var(--crema-2);border-left:2px solid var(--dorado);padding:1rem 1.2rem;font-size:.86rem;margin-bottom:2rem;max-width:70ch}

/* ---------- mapa ---------- */
.map-wrap{display:grid;grid-template-columns:1.5fr 1fr;gap:2rem;align-items:start}
.map-card{background:var(--verde);border-radius:2px;padding:1.6rem;position:relative}
.map-card svg{width:100%;height:auto;display:block}
.do-node{cursor:pointer}
.do-node circle{fill:#2A4536;stroke:rgba(244,240,230,.25);stroke-width:1;transition:fill .2s}
.do-node.disc circle{fill:var(--lima);stroke:var(--crema)}
.do-node:hover circle{stroke-width:2;stroke:var(--crema)}
.map-legend{display:flex;gap:1.4rem;margin-top:1rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,240,230,.75);flex-wrap:wrap}
.map-legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:.4rem;vertical-align:middle}
.map-tip{position:absolute;pointer-events:none;background:var(--crema);color:var(--ink);border-radius:2px;padding:.6rem .9rem;font-size:.78rem;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.28);opacity:0;transition:opacity .15s;z-index:5;max-width:230px}
.map-tip strong{font-family:'Fraunces',serif;font-size:.95rem;color:var(--verde);display:block}
.map-tip .t-status{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinto);font-weight:600}
.do-list{display:flex;flex-direction:column;gap:.5rem;max-height:520px;overflow:auto;padding-right:.4rem}
.do-item{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);background:var(--card);padding:.65rem .9rem;border-radius:2px;font-size:.86rem}
.do-item.locked{opacity:.45}
.do-item .d-name{font-family:'Fraunces',serif;font-size:1rem;color:var(--verde)}

/* ---------- vinos ---------- */
.wine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.1rem}
.wine-card{
  background:var(--card);border:1px solid var(--line);border-radius:2px;
  padding:1.4rem 1rem 1.2rem;display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:.3rem;min-height:300px;
  transition:transform .25s,box-shadow .25s;cursor:pointer;
}
.wine-card:not(.locked):hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(18,41,29,.12)}
.wine-card .w-do{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--tinto);font-weight:600}
.wine-card h3{font-size:1.15rem;color:var(--verde);line-height:1.25}
.wine-card .w-meta{font-size:.74rem;opacity:.65}
.wine-card .w-open{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--tinto);margin-top:auto;padding-top:.5rem;font-weight:600}
.wine-card.locked{
  background:repeating-linear-gradient(-45deg,var(--crema-2),var(--crema-2) 8px,var(--card) 8px,var(--card) 16px);
  opacity:.75;justify-content:center;cursor:default;
}
.wine-card.locked .q{font-family:'Fraunces',serif;font-size:2.6rem;color:var(--gris);line-height:1}
.wine-card.locked p{font-size:.75rem;opacity:.65}
.mini-bottle{height:125px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:.5rem}
.mini-bottle svg{height:100%}
.copas{display:flex;gap:.1rem;margin-top:.3rem}
.wine-card .copas{justify-content:center}
.copas button{background:none;border:none;font-size:1.1rem;padding:0 .06rem;transition:transform .15s;filter:grayscale(1);opacity:.28}
.copas button.on{filter:none;opacity:1}
.copas button:hover{transform:scale(1.22)}
.copas.readonly button{cursor:default;pointer-events:none}
.w-type{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:.35rem;vertical-align:middle}
.w-type.tinto{background:var(--tinto)}
.w-type.blanco{background:var(--dorado)}

/* wine detail */
.detail-grid{display:grid;grid-template-columns:280px 1fr;gap:2.6rem;align-items:start}
.detail-bottle{background:var(--verde);border-radius:2px;padding:2.4rem 1rem;display:flex;justify-content:center}
.detail-bottle svg{height:380px}
.detail-info h2{font-size:2.2rem;color:var(--verde);line-height:1.1}
.detail-info .d-meta{font-size:.9rem;opacity:.7;margin:.5rem 0 1.2rem}
.detail-info .d-desc{max-width:58ch;margin-bottom:1.6rem}
.prof-bar{margin-bottom:.85rem;max-width:420px}
.prof-bar .p-lab{display:flex;justify-content:space-between;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--verde);font-weight:600;margin-bottom:.25rem}
.prof-bar .track{height:5px;background:var(--crema-2);border-radius:3px;overflow:hidden}
.prof-bar .fill{height:100%;background:linear-gradient(90deg,var(--lima),var(--verde));border-radius:3px;width:0;transition:width 1s ease}
.back-link{background:none;border:none;color:var(--tinto);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-bottom:1.4rem;display:inline-block}
.back-link:hover{text-decoration:underline}

/* ---------- uvas ---------- */
.uva-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:1rem}
.uva{border:1px solid var(--line);background:var(--card);border-radius:2px;padding:1.2rem 1rem;text-align:center;transition:transform .25s;position:relative;overflow:hidden}
.uva:not(.locked):hover{transform:translateY(-3px)}
.uva .u-dot{width:44px;height:44px;border-radius:50%;margin:0 auto .7rem;display:flex;align-items:center;justify-content:center;font-size:1.15rem}
.uva.t .u-dot{background:radial-gradient(circle at 35% 30%,#A6485C,var(--tinto))}
.uva.b .u-dot{background:radial-gradient(circle at 35% 30%,#E8DFA8,#C7A94B)}
.uva h3{font-size:1.1rem;color:var(--verde)}
.uva .u-sub{font-size:.68rem;opacity:.6}
.uva.locked{
  opacity:.6;
  background:repeating-linear-gradient(-45deg,var(--crema-2),var(--crema-2) 8px,var(--card) 8px,var(--card) 16px);
}
.uva.locked .u-dot{background:var(--crema-2);color:var(--gris)}
.uva .u-wines{
  position:absolute;inset:0;background:var(--verde);color:var(--crema);
  display:flex;flex-direction:column;justify-content:center;padding:1rem;
  font-size:.72rem;line-height:1.5;opacity:0;transition:opacity .25s;pointer-events:none;
}
.uva .u-wines .uw-t{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--lima);font-weight:600;margin-bottom:.3rem}
.uva:not(.locked):hover .u-wines,.uva:not(.locked):focus-within .u-wines{opacity:1}

/* ---------- bodegas ---------- */
.bodega-list{display:flex;flex-direction:column;gap:.6rem}
.bodega{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:1.1rem 1.3rem}
.bodega h3{font-size:1.15rem;color:var(--verde)}
.bodega .b-do{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tinto);font-weight:600}
.bodega p{font-size:.8rem;opacity:.75;margin-top:.25rem}
.bodega-node circle{fill:var(--dorado);stroke:var(--crema);stroke-width:1;cursor:pointer}
.bodega-node:hover circle{stroke-width:2}

/* ---------- paladar ---------- */
.pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start}
.pal-insight{font-family:'Fraunces',serif;font-style:italic;font-size:1.2rem;color:var(--verde);border-left:2px solid var(--tinto);padding-left:1.2rem;line-height:1.5;margin-top:1.4rem}
.top-vino{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--line);font-size:.86rem}
.top-vino:last-child{border-bottom:none}
.split{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:.6rem 0 .3rem}
.split .s-t{background:var(--tinto)}
.split .s-b{background:var(--dorado)}
.split-lab{display:flex;justify-content:space-between;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--verde)}

/* ---------- cuenta ---------- */
.cuenta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;align-items:start}
.cuenta-grid h3{font-size:1.35rem;color:var(--verde);margin-bottom:1rem}
.sub-status{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem}
.sub-status .dot{width:9px;height:9px;border-radius:50%;background:#4E7A5A}
.sub-status .dot.paused{background:var(--dorado)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gris);font-weight:600;padding:.5rem .6rem;border-bottom:1px solid var(--line)}
td{padding:.65rem .6rem;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
.one-click{font-size:.72rem;opacity:.55;margin-top:.7rem}

#toast{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--verde-2);color:var(--crema);padding:.8rem 1.6rem;border-radius:2px;font-size:.8rem;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.demo-note{margin-top:1.6rem;text-align:center;font-size:.62rem;letter-spacing:.1em;opacity:.4;text-transform:uppercase}
.section-note{font-size:.8rem;opacity:.6;margin-top:1.4rem;max-width:70ch}

@media (max-width:900px){
  .viaje-wrap,.map-wrap,.pal-grid,.cuenta-grid,.detail-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .next-box{position:static}
  .tabs{order:3;width:100%;overflow-x:auto;flex-wrap:nowrap}
  .detail-bottle svg{height:280px}
}
</style>
</head>
<body>

<div id="loginView">
  <div class="login-ring" aria-hidden="true"></div>
  <div class="login-card">
    <span class="login-logo">VIN<span>A</span></span>
    <p class="login-sub">Tu área personal</p>
    <div class="field"><label for="lu">Email</label><input id="lu" autocomplete="off" placeholder="ana@email.com"></div>
    <div class="field"><label for="lp">Contraseña</label><input id="lp" type="password" autocomplete="off" placeholder="••••••"></div>
    <button class="btn btn-verde" style="width:100%;text-align:center" onclick="tryLogin()">Entrar</button>
    <p class="login-error" id="loginError"></p>
    <button class="btn btn-outline btn-sm" style="width:100%;text-align:center;margin-top:.6rem" onclick="enter()">Entrar con la cuenta de ejemplo</button>
    <p class="login-hint">Demo — ana / vina</p>
  </div>
</div>

<div id="appView">
  <div class="topbar">
    <a class="logo" href="index.html">VIN<span>A</span></a>
    <div class="tabs" id="tabs">
      <button data-page="viaje" class="active">Tu Viaje</button>
      <button data-page="dos">Tus DOs</button>
      <button data-page="vinos">Tus Vinos</button>
      <button data-page="uvas">Tus Uvas</button>
      <button data-page="bodegas">Tus Bodegas</button>
      <button data-page="paladar">Tu Paladar</button>
      <button data-page="cuenta">Mi Cuenta</button>
    </div>
    <div class="top-right">
      <a class="top-link" href="index.html">← Web</a>
      <span class="hello">Hola, Ana 🍷</span>
      <button class="top-salir" onclick="logout()">Salir</button>
    </div>
  </div>
  <main id="pageRoot"></main>
</div>

<div id="toast"></div>

<script>
/* =============== DATOS DEMO (en memoria) =============== */
const ETAPAS = [
  {n:1,do:"Rioja",estado:"done",texto:"Donde casi todos empezamos: Tempranillo, crianza y el porqué de las barricas.",vinos:"Valdemonte Crianza 2020 · Finca La Serna Blanco 2022"},
  {n:2,do:"Ribera del Duero",estado:"done",texto:"La misma uva, otra altitud, otro carácter. Tu primer duelo de paladar.",vinos:"Páramo Alto 2021 · Cepas del Duero Roble 2022"},
  {n:3,do:"Rías Baixas",estado:"done",texto:"Tu primer blanco atlántico: Albariño, salinidad y frescura.",vinos:"Mar de Orballo 2023 · Pazo de Sombra 2022"},
  {n:4,do:"Priorat",estado:"current",texto:"Llicorella, viñas viejas y garnachas de montaña. Sube el nivel.",vinos:"Llicorella Vella 2019 · Costers del Nord 2021"},
  {n:5,do:"?",estado:"locked",texto:"Se revela cuando llegue a tu puerta, el 1 de agosto.",vinos:""},
  {n:6,do:"?",estado:"locked",texto:"",vinos:""},
  {n:7,do:"?",estado:"locked",texto:"",vinos:""},
  {n:8,do:"?",estado:"locked",texto:"",vinos:""},
];

const DOS = [
  {n:"Rías Baixas",x:115,y:205,reg:"Galicia",disc:true,fecha:"Mayo 2026",nota:"Albariño atlántico, fresco y salino."},
  {n:"Ribeiro",x:150,y:225,reg:"Galicia"},
  {n:"Ribeira Sacra",x:182,y:200,reg:"Galicia"},
  {n:"Valdeorras",x:212,y:220,reg:"Galicia"},
  {n:"Monterrei",x:185,y:246,reg:"Galicia"},
  {n:"Bierzo",x:247,y:214,reg:"Castilla y León"},
  {n:"Toro",x:285,y:300,reg:"Castilla y León"},

function doSlug(n){
  const s = n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  return DO_ALIAS[s] || s;
}
async function initMap(){
  const box=$("realMap"), tip=$("mapTip"), card=$("mapCard");
  if(!box) return;
  try{
    const res = await fetch("dos-map.svg");
    box.innerHTML = await res.text();
  }catch(e){ box.innerHTML = '<p style="padding:2rem;opacity:.6">El mapa no ha podido cargarse.</p>'; return; }
  const byId = {};
  DOS.forEach(d=>{ byId[doSlug(d.n)] = d; });
  box.querySelectorAll("path.zone").forEach(pz=>{
    const d = byId[pz.id];
    if(d && d.disc) pz.classList.add("disc");
    pz.addEventListener("mousemove", ev=>{
      const r = card.getBoundingClientRect();
      tip.style.opacity = 1;
      tip.style.left = Math.min(ev.clientX-r.left+14, r.width-240)+"px";
      tip.style.top  = (ev.clientY-r.top+14)+"px";
      tip.innerHTML = (d && d.disc)
        ? `<span class="t-status">Descubierta · ${esc(d.fecha)}</span><strong>${esc(d.n)}</strong>${esc(d.reg)}<br>${esc(d.nota||"")}`
        : `<span class="t-status" style="color:var(--gris)">Por descubrir</span><strong>?????</strong>Sigue el viaje para revelarla`;
    });
    pz.addEventListener("mouseleave", ()=> tip.style.opacity = 0);
  });
}

function initBodegaMap(){
  const g=$("bodegaNodes"),tip=$("bodegaTip"),card=$("bodegaMapCard");
  BODEGAS.forEach(b=>{
    const node=document.createElementNS("http://www.w3.org/2000/svg","g");
    node.setAttribute("class","bodega-node");
    node.innerHTML=`<circle cx="${b.x}" cy="${b.y}" r="8"/>`;
    node.addEventListener("mousemove",ev=>{
      const r=card.getBoundingClientRect();
      tip.style.opacity=1;
      tip.style.left=Math.min(ev.clientX-r.left+14,r.width-240)+"px";
      tip.style.top=(ev.clientY-r.top+14)+"px";
      tip.innerHTML=`<span class="t-status">${esc(b.do)}</span><strong>${esc(b.n)}</strong>${esc(b.desc)}`;
    });
    node.addEventListener("mouseleave",()=>tip.style.opacity=0);
    g.appendChild(node);
  });
}

/* =============== TU PALADAR (calculado de tus votos) =============== */
function calcPaladar(){
  const rated=VINOS.filter(v=>v.rating>0);
  if(!rated.length) return null;
  const keys=["cuerpo","acidez","fruta","madera","mineral"];
  const perfil={};
  keys.forEach(k=>{
    let num=0,den=0;
    rated.forEach(v=>{num+=v.perfil[k]*v.rating;den+=v.rating});
    perfil[k]=Math.round(num/den);
  });
  let tinto=0,blanco=0;
  rated.forEach(v=>{v.tipo==="tinto"?tinto+=v.rating:blanco+=v.rating});
  const pctT=Math.round(tinto/(tinto+blanco)*100);
  /* uvas favoritas: media de copas por uva */
  const uvaScore={};
  rated.forEach(v=>v.uvas.forEach(u=>{(uvaScore[u]=uvaScore[u]||[]).push(v.rating)}));
  const uvasFav=Object.entries(uvaScore).map(([u,rs])=>({u,m:rs.reduce((a,b)=>a+b)/rs.length}))
    .sort((a,b)=>b.m-a.m);
  /* DO favorita */
  const doScore={};
  rated.forEach(v=>{(doScore[v.do]=doScore[v.do]||[]).push(v.rating)});
  const dosFav=Object.entries(doScore).map(([d,rs])=>({d,m:rs.reduce((a,b)=>a+b)/rs.length}))
    .sort((a,b)=>b.m-a.m);
  return {perfil,pctT,uvasFav,dosFav,rated};
}
function pPaladar(){
  const p=calcPaladar();
  if(!p) return `<div class="page-head"><span class="eyebrow">Tu Paladar</span><h2>Aún en blanco</h2>
    <p>Valora tus vinos y aquí aparecerá el dibujo de tu gusto. Empieza por <button class="back-link" style="margin:0" onclick="goTab('vinos')">tus vinos →</button></p></div>`;
  const topUva=p.uvasFav[0], topDo=p.dosFav[0];
  const insight = p.pctT>=55
    ? `"Te tiran los ${p.perfil.cuerpo>=60?"tintos con cuerpo":"tintos ligeros"} y la ${topUva.u} te tiene ganada. Pero ojo a lo que dicen tus copas de los blancos… hay una historia ahí."`
    : `"Los blancos van ganando la partida en tus copas — y la ${topUva.u} encabeza la lista. La próxima etapa puede cambiarlo todo."`;
  return `
  <div class="page-head"><span class="eyebrow">Tu Paladar</span><h2>Así va tomando forma tu gusto</h2>
  <p>Todo lo que ves aquí sale de tus copas: cruzamos tus valoraciones con el perfil de cada vino y sus uvas. Cuantos más vinos votes, más nítido será el dibujo. Has valorado ${p.rated.length} de ${VINOS.length} vinos.</p></div>
  <div class="pal-grid">
    <div class="card">
      <h3 class="serif" style="font-size:1.35rem;color:var(--verde);margin-bottom:1.2rem">Tu perfil de preferencias</h3>
      ${Object.entries(p.perfil).map(([k,val])=>`
        <div class="prof-bar"><div class="p-lab"><span>${PERFIL_LABELS[k]}</span><span>${nivel(val)}</span></div>
        <div class="track"><div class="fill" data-w="${val}%"></div></div></div>`).join("")}
      <div class="split-lab" style="margin-top:1.4rem"><span>Tinto ${p.pctT}%</span><span>Blanco ${100-p.pctT}%</span></div>
      <div class="split"><div class="s-t" style="width:${p.pctT}%"></div><div class="s-b" style="width:${100-p.pctT}%"></div></div>
      <p style="font-size:.68rem;opacity:.5">Reparto de tus copas otorgadas</p>
      <p class="pal-insight">${insight}</p>
    </div>
    <div class="card">
      <h3 class="serif" style="font-size:1.35rem;color:var(--verde);margin-bottom:.6rem">Tus mejor valorados</h3>
      ${p.rated.slice().sort((a,b)=>b.rating-a.rating).map(v=>`
        <div class="top-vino"><span><span class="w-type ${v.tipo}"></span>${esc(v.n)} ${v.anio}<br><span style="font-size:.7rem;opacity:.6">${esc(v.do)} · ${v.uvas.map(esc).join(", ")}</span></span>
        <span style="color:var(--tinto)">${"🍷".repeat(v.rating)}</span></div>`).join("")}
      <h3 class="serif" style="font-size:1.15rem;color:var(--verde);margin:1.4rem 0 .4rem">Tus uvas favoritas</h3>
      <p style="font-size:.86rem">${p.uvasFav.map((u,i)=>`${i+1}. <strong>${esc(u.u)}</strong> (${u.m.toFixed(1)} copas de media)`).join("<br>")}</p>
      <p class="section-note">Tu DO mejor valorada hasta ahora: <strong>${esc(topDo.d)}</strong> con ${topDo.m.toFixed(1)} copas de media.</p>
    </div>
  </div>`;
}
